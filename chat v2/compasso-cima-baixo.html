<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compasso · Cima Baixo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0a;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
  .stage{width:100%;max-width:600px;aspect-ratio:1/1;position:relative;overflow:hidden;border-radius:12px;background:#0a0a0a}
  .axis{position:absolute;left:10%;right:10%;top:50%;height:0.5px;background:rgba(255,255,255,0.15)}
  .ball{aspect-ratio:1/1;border-radius:50%;position:absolute;left:50%;transform:translateX(-50%);opacity:0;transition:opacity 0.03s}
  .ball.red{background:#E24B4A;top:2%}
  .ball.blue{background:#378ADD;bottom:2%}
  .lbl{position:absolute;left:50%;transform:translateX(-50%);font-size:clamp(13px,2vw,18px);font-weight:500;opacity:0;letter-spacing:0.05em}
  .lbl.tik{top:4%;color:#A32D2D}
  .lbl.tak{bottom:4%;color:#185FA5}
  .counter{position:absolute;top:50%;right:4%;transform:translateY(-50%);font-size:11px;color:rgba(255,255,255,0.3);font-family:monospace}
  .controls{display:flex;align-items:center;gap:10px;padding:0.7rem 0 0;flex-wrap:wrap;width:100%;max-width:600px}
  .btn{padding:6px 16px;border:0.5px solid rgba(255,255,255,0.2);border-radius:8px;font-size:13px;background:transparent;color:#ccc;cursor:pointer}
  .btn:hover{background:rgba(255,255,255,0.08)}
  .sep{width:0.5px;height:18px;background:rgba(255,255,255,0.15)}
  .lc{font-size:12px;color:#888}
  .gv{font-size:12px;font-weight:500;font-family:monospace;min-width:32px;color:#fff}
  a.back{display:inline-block;margin-bottom:1rem;font-size:12px;color:#555;text-decoration:none}
  a.back:hover{color:#aaa}
</style>
</head>
<body>
<a class="back" href="index.html">← índice</a>
<div class="stage" id="stage">
  <div class="axis"></div>
  <div class="ball red" id="ball-red"></div>
  <div class="ball blue" id="ball-blue"></div>
  <div class="lbl tik" id="lbl-tik">tik</div>
  <div class="lbl tak" id="lbl-tak">tak</div>
  <div class="counter" id="counter">÷ 2</div>
</div>
<div class="controls">
  <button class="btn" id="btn-play" onclick="togglePlay()">⏸ pausar</button>
  <div class="sep"></div>
  <span class="lc">velocidade</span>
  <input type="range" min="0.3" max="3" step="0.1" value="1" oninput="setSpeed(+this.value)" style="width:100px;accent-color:#fff">
  <div class="sep"></div>
  <span class="lc">divisão</span>
  <button class="btn" onclick="setDiv(1)">÷2</button>
  <button class="btn" onclick="setDiv(2)">÷4</button>
  <button class="btn" onclick="setDiv(3)">÷8</button>
</div>
<script>
  let playing=true,speed=1,divN=1,timer=null,stepN=0,ballSz=0;
  const stage=document.getElementById('stage');
  const bRed=document.getElementById('ball-red');
  const bBlue=document.getElementById('ball-blue');
  const lTik=document.getElementById('lbl-tik');
  const lTak=document.getElementById('lbl-tak');
  const counter=document.getElementById('counter');
  function resize(){const sz=Math.round(stage.offsetWidth*0.44);bRed.style.width=sz+'px';bBlue.style.width=sz+'px';}
  window.addEventListener('resize',resize);resize();
  function show(which){bRed.style.opacity=which==='tik'?'1':'0';bBlue.style.opacity=which==='tak'?'1':'0';lTik.style.opacity=which==='tik'?'1':'0';lTak.style.opacity=which==='tak'?'1':'0';}
  function hide(){bRed.style.opacity='0';bBlue.style.opacity='0';lTik.style.opacity='0';lTak.style.opacity='0';}
  function getHalfMs(){return(800/speed)/Math.pow(2,divN-1)/2;}
  function tick(){const parts=Math.pow(2,divN);const phase=stepN%(parts*2);const beatIdx=Math.floor(phase/2);const isShow=phase%2===0;if(isShow){show(beatIdx%2===0?'tik':'tak');}else{hide();}stepN++;timer=setTimeout(tick,getHalfMs());}
  function stopTimer(){if(timer){clearTimeout(timer);timer=null;}}
  function startTimer(){stopTimer();stepN=0;tick();}
  function togglePlay(){playing=!playing;document.getElementById('btn-play').textContent=playing?'⏸ pausar':'▶ play';if(playing)startTimer();else{stopTimer();hide();}}
  function setSpeed(v){speed=v;if(playing)startTimer();}
  function setDiv(d){divN=d;counter.textContent='÷ '+Math.pow(2,d);if(playing)startTimer();}
  startTimer();
</script>
</body>
</html>
