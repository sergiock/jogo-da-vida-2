<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat B — artefatos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    min-height: 100vh; padding: 2rem 1rem 4rem;
  }
  header {
    max-width: 800px; margin: 0 auto 2.5rem;
    border-bottom: 0.5px solid rgba(255,255,255,0.1);
    padding-bottom: 1.2rem;
  }
  header h1 { font-size: 22px; font-weight: 500; color: #fff; letter-spacing: 0.02em; }
  header p  { font-size: 13px; color: #555; margin-top: 5px; }

  .search-bar {
    max-width: 800px; margin: 0 auto 1.4rem;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .search-bar input {
    flex: 1; min-width: 180px; padding: 8px 14px;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: #e0e0e0; font-size: 13px; outline: none;
  }
  .search-bar input:focus { border-color: rgba(255,255,255,0.35); }
  .search-bar input::placeholder { color: #555; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag-btn {
    padding: 5px 12px; border-radius: 20px;
    border: 0.5px solid rgba(255,255,255,0.15);
    font-size: 11px; background: transparent;
    color: #777; cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .tag-btn:hover { border-color: rgba(255,255,255,0.3); color: #bbb; }
  .tag-btn.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.38); }

  .count { max-width: 800px; margin: 0 auto 1rem; font-size: 12px; color: #444; }

  .grid {
    max-width: 800px; margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .card {
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 1rem 1.1rem;
    display: flex; flex-direction: column; gap: 9px;
    text-decoration: none; color: inherit;
    transition: border-color .15s, background .15s;
  }
  .card:hover { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.06); }

  .card-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
  }
  .card-title { font-size: 14px; font-weight: 500; color: #fff; line-height: 1.3; }
  .card-desc  { font-size: 12px; color: #666; line-height: 1.55; flex: 1; }

  .card-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .pill {
    padding: 2px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 500; letter-spacing: 0.03em;
  }
  .pill.ritmo  { background: rgba(226,75,74,0.18);  color: #f09595; }
  .pill.faixas { background: rgba(55,138,221,0.18); color: #85b7eb; }
  .pill.som    { background: rgba(239,159,39,0.18); color: #fac775; }
  .pill.visual { background: rgba(127,119,221,0.18);color: #afa9ec; }
  .pill.grade  { background: rgba(29,158,117,0.18); color: #9fe1cb; }

  .open-lnk {
    margin-left: auto; font-size: 11px; color: #444;
    display: flex; align-items: center; gap: 3px;
  }
  .empty { max-width: 800px; margin: 3rem auto; text-align: center; font-size: 13px; color: #444; }
</style>
</head>
<body>

<header>
  <h1>Chat B — artefatos</h1>
  <p>divisões do tempo e do espaço · tik · tak</p>
</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="buscar por nome, descrição ou tag…" oninput="filter()">
  <div class="filters" id="filters"></div>
</div>

<div class="count" id="count"></div>
<div class="grid"  id="grid"></div>
<div class="empty" id="empty" style="display:none">nenhum artefato encontrado</div>

<script>
const ARTIFACTS = [
  {
    file: 'tik-tak-som.html',
    title: 'tik · tak com som',
    desc: 'Bola tela inteira, acima e abaixo. Tom agudo no tik, grave no tak. Anel de expansão. Controle de bpm e divisão.',
    icon: '◎', iconBg: 'rgba(239,159,39,0.15)',
    tags: ['ritmo','som'],
  },
  {
    file: 'compasso-cima-baixo.html',
    title: 'compasso cima · baixo',
    desc: 'Bola vermelha acima, azul abaixo. Linha do tempo com rastro de pontos visitados.',
    icon: '⬤', iconBg: 'rgba(226,75,74,0.15)',
    tags: ['ritmo','som'],
  },
  {
    file: 'seis-canais.html',
    title: 'seis canais crescentes',
    desc: '6 linhas simultâneas, cada uma com 1…6 bolas crescentes alternando tik e tak em ritmos independentes.',
    icon: '▬', iconBg: 'rgba(55,138,221,0.15)',
    tags: ['ritmo','visual'],
  },
  {
    file: 'faixas-numeradas-v1.html',
    title: 'faixas numeradas',
    desc: 'Faixas com número central. Vermelho · branco · azul. Horizontal/vertical. Modos linear, espelho, alternância.',
    icon: '▤', iconBg: 'rgba(127,119,221,0.15)',
    tags: ['faixas','visual'],
  },
  {
    file: 'faixas-numeradas-v2.html',
    title: 'faixas numeradas + pulso',
    desc: 'Igual ao anterior, mas o número da faixa ativa pulsa — cresce e encolhe sincronizado com o ritmo.',
    icon: '▣', iconBg: 'rgba(127,119,221,0.22)',
    tags: ['faixas','visual'],
  },
  {
    file: 'faixas-tik-tak-som.html',
    title: 'faixas + tik·tak + som',
    desc: 'Pano de fundo com faixas pulsantes, bolas tik·tak e som. Tudo sincronizado. Versão completa.',
    icon: '◈', iconBg: 'rgba(29,158,117,0.15)',
    tags: ['faixas','ritmo','som','grade'],
  },
];

const ALL_TAGS = [...new Set(ARTIFACTS.flatMap(a => a.tags))];
let activeTag = null;

function renderFilters() {
  const wrap = document.getElementById('filters');
  wrap.innerHTML = '';
  ALL_TAGS.forEach(tag => {
    const b = document.createElement('button');
    b.className = 'tag-btn' + (activeTag === tag ? ' active' : '');
    b.textContent = tag;
    b.onclick = () => { activeTag = activeTag === tag ? null : tag; filter(); };
    wrap.appendChild(b);
  });
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  renderFilters();

  const results = ARTIFACTS.filter(a => {
    const matchTag = !activeTag || a.tags.includes(activeTag);
    const matchQ   = !q || a.title.includes(q) || a.desc.toLowerCase().includes(q) || a.tags.some(t => t.includes(q));
    return matchTag && matchQ;
  });

  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('count').textContent = results.length + ' artefato' + (results.length !== 1 ? 's' : '');

  grid.innerHTML = '';
  empty.style.display = results.length === 0 ? 'block' : 'none';

  results.forEach(a => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = '/chatb/' + a.file;
    card.target = '_blank';
    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px">
        <div class="card-icon" style="background:${a.iconBg}">${a.icon}</div>
        <div class="card-title">${a.title}</div>
      </div>
      <div class="card-desc">${a.desc}</div>
      <div class="card-footer">
        ${a.tags.map(t=>`<span class="pill ${t}">${t}</span>`).join('')}
        <span class="open-lnk">abrir
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 10L10 2M5 2h5v5"/>
          </svg>
        </span>
      </div>
    `;
    grid.appendChild(card);
  });
}

filter();
</script>
</body>
</html>
