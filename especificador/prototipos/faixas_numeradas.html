<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faixas Numeradas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .wrap { width: 100%; max-width: 600px; }
  .stage {
    width: 100%; aspect-ratio: 1/1;
    position: relative; overflow: hidden;
    border-radius: 12px; background: #0a0a0a;
  }
  .controls-bar {
    display: flex; align-items: center;
    gap: 8px; padding: 0.7rem 0 0; flex-wrap: wrap;
  }
  .btn {
    padding: 5px 13px;
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    font-size: 12px; background: transparent;
    color: #ccc; cursor: pointer; white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.08); }
  .btn.on { background: rgba(255,255,255,0.12); font-weight: 500; color: #fff; }
  .sep { width: 0.5px; height: 18px; background: rgba(255,255,255,0.15); flex-shrink:0; }
  .lbl-ctrl { font-size: 12px; color: #888; white-space: nowrap; }
  .grid-ctrl { display: flex; align-items: center; gap: 6px; }
  .grid-ctrl input { width: 70px; accent-color: #fff; }
  .grid-val { font-size: 12px; font-weight: 500; font-family: monospace; min-width: 20px; color: #fff; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage" id="stage"><canvas id="cv"></canvas></div>
  <div class="controls-bar">
    <button class="btn" id="btn-play" onclick="togglePlay()">⏸ pausar</button>
    <div class="sep"></div>
    <span class="lbl-ctrl">direção</span>
    <button class="btn on" id="btn-h" onclick="setDir('h')">horizontal</button>
    <button class="btn"    id="btn-v" onclick="setDir('v')">vertical</button>
    <div class="sep"></div>
    <span class="lbl-ctrl">modo</span>
    <button class="btn on" id="btn-m1" onclick="setMode(1)">→ linear</button>
    <button class="btn"    id="btn-m2" onclick="setMode(2)">⇄ espelho</button>
    <button class="btn"    id="btn-m3" onclick="setMode(3)">⇆ alternância</button>
    <div class="sep"></div>
    <div class="grid-ctrl">
      <span class="lbl-ctrl">faixas</span>
      <input type="range" min="1" max="12" step="1" value="6" id="sl-n" oninput="setN(+this.value)">
      <span class="grid-val" id="val-n">6</span>
    </div>
    <div class="sep"></div>
    <span class="lbl-ctrl">vel</span>
    <input type="range" min="0.2" max="4" step="0.1" value="1" id="sl-spd" oninput="setSpd(+this.value)" style="width:70px">
    <span class="grid-val" id="val-spd">1×</span>
  </div>
</div>

<script>
  let N=6, spd=1, playing=true, timer=null, dir='h', mode=1;
  let seq=[], seqIdx=0, pos=0, visited=[];

  const stage=document.getElementById('stage');
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  const BG='#0a0a0a';

  function getColor(i,n,dim){
    if(n===1) return dim?'rgba(255,255,255,0.12)':'#ffffff';
    const lo=Math.floor(n/2), hi=Math.ceil(n/2);
    if(i<lo)  return dim?'rgba(226,75,74,0.22)':'#E24B4A';
    if(i>=hi) return dim?'rgba(55,138,221,0.22)':'#378ADD';
    return dim?'rgba(255,255,255,0.18)':'#ffffff';
  }

  function resize(){
    const s=stage.offsetWidth, dpr=window.devicePixelRatio||1;
    cv.width=s*dpr; cv.height=s*dpr;
    cv.style.width=s+'px'; cv.style.height=s+'px';
    ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr); draw();
  }
  window.addEventListener('resize',resize);

  function draw(){
    const s=stage.offsetWidth, span=s/N;
    ctx.clearRect(0,0,s,s);
    ctx.fillStyle=BG; ctx.fillRect(0,0,s,s);
    const fontSize=Math.max(11,Math.min(span*0.52,s*0.09));
    for(let i=0;i<N;i++){
      const isLit=i===pos, wasLit=visited.includes(i)&&!isLit;
      const color=getColor(i,N,!isLit);
      let x,y,w,h;
      if(dir==='h'){x=0;y=i*span;w=s;h=span;}
      else{x=i*span;y=0;w=span;h=s;}
      ctx.fillStyle=color;
      ctx.globalAlpha=isLit?1:(wasLit?0.28:0.08);
      ctx.fillRect(x,y,w,h);
      ctx.globalAlpha=1;
      if(isLit){
        ctx.strokeStyle='#fff'; ctx.globalAlpha=0.1;
        ctx.lineWidth=0.5; ctx.strokeRect(x+.25,y+.25,w-.5,h-.5);
        ctx.globalAlpha=1;
      }
      const numAlpha=isLit?1:(wasLit?0.25:0.12);
      ctx.font=`500 ${fontSize}px monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#ffffff'; ctx.globalAlpha=numAlpha;
      const cx=dir==='h'?s/2:x+span/2;
      const cy=dir==='h'?y+span/2:s/2;
      ctx.fillText(i+1,cx,cy); ctx.globalAlpha=1;
    }
  }

  function buildSequence(){
    if(mode===1) return Array.from({length:N},(_,i)=>i);
    if(mode===2){
      const s=[];
      for(let i=0;i<N;i++) s.push(i);
      for(let i=N-2;i>=1;i--) s.push(i);
      return s;
    }
    const s=[];
    for(let i=0;i<N;i++) s.push(i);
    for(let i=N-2;i>=1;i--) s.push(i);
    for(let i=1;i<N;i++) s.push(i);
    return s;
  }

  function tick(){
    pos=seq[seqIdx]; visited=seq.slice(0,seqIdx);
    seqIdx=(seqIdx+1)%seq.length;
    if(seqIdx===0) visited=[];
    draw();
    timer=setTimeout(tick,Math.round(700/spd));
  }

  function stopTimer(){if(timer){clearTimeout(timer);timer=null;}}
  function startTimer(){
    stopTimer(); seq=buildSequence(); seqIdx=0; pos=seq[0]; visited=[]; draw();
    timer=setTimeout(tick,Math.round(700/spd));
  }

  function togglePlay(){
    playing=!playing;
    document.getElementById('btn-play').textContent=playing?'⏸ pausar':'▶ play';
    if(playing) startTimer(); else stopTimer();
  }
  function setDir(d){
    dir=d;
    document.getElementById('btn-h').classList.toggle('on',d==='h');
    document.getElementById('btn-v').classList.toggle('on',d==='v');
    startTimer();
  }
  function setMode(m){
    mode=m;
    [1,2,3].forEach(i=>document.getElementById('btn-m'+i).classList.toggle('on',i===m));
    startTimer();
  }
  function setN(v){ N=v; document.getElementById('val-n').textContent=v; startTimer(); }
  function setSpd(v){
    spd=v; document.getElementById('val-spd').textContent=v.toFixed(1)+'×';
    if(playing) startTimer();
  }

  resize(); startTimer();
</script>
</body>
</html>
