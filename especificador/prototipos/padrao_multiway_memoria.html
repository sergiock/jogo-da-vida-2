<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padrão Multiway de Memória — Jogo da Vida</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f8f7f3;
    color: #2c2c2a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 0.4rem;
    color: #2c2c2a;
  }

  p.subtitle {
    font-size: 13px;
    color: #888780;
    margin-bottom: 2rem;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 0.5px solid rgba(0,0,0,0.12);
    padding: 2rem;
    max-width: 720px;
    width: 100%;
  }

  svg { width: 100%; height: auto; display: block; }

  /* SVG color classes — light mode */
  .c-amber > rect, .c-amber > circle, .c-amber > ellipse { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }

  .c-purple > rect, .c-purple > circle, .c-purple > ellipse { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  .c-teal > rect, .c-teal > circle, .c-teal > ellipse { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  .c-blue > rect, .c-blue > circle, .c-blue > ellipse { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  .th { font-size: 14px; font-weight: 500; font-family: system-ui, sans-serif; }
  .ts { font-size: 12px; font-weight: 400; font-family: system-ui, sans-serif; fill: #5F5E5A; }

  .node { cursor: default; }

  .legend {
    margin-top: 1.5rem;
    font-size: 12px;
    color: #888780;
    text-align: center;
    line-height: 1.6;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #c2c0b6; }
    h1 { color: #e8e6de; }
    .card { background: #242422; border-color: rgba(255,255,255,0.1); }

    .c-amber > rect, .c-amber > circle, .c-amber > ellipse { fill: #633806; stroke: #FAC775; }
    .c-amber .th { fill: #FAC775; }
    .c-amber .ts { fill: #EF9F27; }

    .c-purple > rect, .c-purple > circle, .c-purple > ellipse { fill: #3C3489; stroke: #CECBF6; }
    .c-purple .th { fill: #CECBF6; }
    .c-purple .ts { fill: #AFA9EC; }

    .c-teal > rect, .c-teal > circle, .c-teal > ellipse { fill: #085041; stroke: #9FE1CB; }
    .c-teal .th { fill: #9FE1CB; }
    .c-teal .ts { fill: #5DCAA5; }

    .c-blue > rect, .c-blue > circle, .c-blue > ellipse { fill: #0C447C; stroke: #B5D4F4; }
    .c-blue .th { fill: #B5D4F4; }
    .c-blue .ts { fill: #85B7EB; }

    .ts { fill: #888780; }
    .legend { color: #5F5E5A; }
  }
</style>
</head>
<body>

<div style="text-align:center; margin-bottom: 1.5rem;">
  <h1>Padrão Multiway de Memória</h1>
  <p class="subtitle">Jogo da Vida · Sistema de desenvolvimento · 2026-03-18</p>
</div>

<div class="card">
  <svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Centro: sessão atual -->
    <g class="node c-amber">
      <rect x="230" y="210" width="220" height="60" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="234" text-anchor="middle" dominant-baseline="central">Sessão atual</text>
      <text class="ts" x="340" y="254" text-anchor="middle" dominant-baseline="central">contexto de processo injetado</text>
    </g>

    <!-- DIREÇÃO 1: Memória longitudinal -->
    <g class="node c-purple">
      <rect x="40" y="44" width="220" height="68" rx="8" stroke-width="0.5"/>
      <text class="th" x="150" y="68" text-anchor="middle" dominant-baseline="central">Memória longitudinal</text>
      <text class="ts" x="150" y="88" text-anchor="middle" dominant-baseline="central">sessões anteriores destiladas</text>
    </g>
    <line x1="230" y1="235" x2="262" y2="170" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
    <line x1="260" y1="112" x2="248" y2="215" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
    <text class="ts" x="190" y="168" text-anchor="middle" dominant-baseline="central" opacity="0.6">acumula</text>

    <!-- DIREÇÃO 2: Memória projetiva -->
    <g class="node c-teal">
      <rect x="420" y="44" width="220" height="68" rx="8" stroke-width="0.5"/>
      <text class="th" x="530" y="68" text-anchor="middle" dominant-baseline="central">Memória projetiva</text>
      <text class="ts" x="530" y="88" text-anchor="middle" dominant-baseline="central">próxima fase antecipada</text>
    </g>
    <line x1="450" y1="112" x2="435" y2="215" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
    <text class="ts" x="490" y="168" text-anchor="middle" dominant-baseline="central" opacity="0.6">orienta</text>

    <!-- DIREÇÃO 3: Memória estrutural -->
    <g class="node c-blue">
      <rect x="200" y="380" width="280" height="68" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="404" text-anchor="middle" dominant-baseline="central">Memória estrutural</text>
      <text class="ts" x="340" y="424" text-anchor="middle" dominant-baseline="central">padrões → base replicável</text>
    </g>
    <line x1="340" y1="270" x2="340" y2="378" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
    <text class="ts" x="366" y="326" text-anchor="middle" dominant-baseline="central" opacity="0.6">precipita</text>

    <!-- Labels direção -->
    <text class="ts" x="150" y="130" text-anchor="middle" dominant-baseline="central" opacity="0.45">← passado</text>
    <text class="ts" x="530" y="130" text-anchor="middle" dominant-baseline="central" opacity="0.45">futuro →</text>
    <text class="ts" x="340" y="464" text-anchor="middle" dominant-baseline="central" opacity="0.45">↓ coletivo</text>

    <!-- Caixa "Resolve" -->
    <rect x="40" y="355" width="140" height="80" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="ts" x="110" y="381" text-anchor="middle" dominant-baseline="central" opacity="0.7">Resolve:</text>
    <text class="ts" x="110" y="399" text-anchor="middle" dominant-baseline="central" opacity="0.7">ubiquidade do</text>
    <text class="ts" x="110" y="417" text-anchor="middle" dominant-baseline="central" opacity="0.7">desenvolvedor</text>
    <path d="M180 395 Q210 395 228 260" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35" marker-end="url(#arrow)"/>
  </svg>

  <p class="legend">
    O contexto de processo é o mecanismo que injeta as três direções em cada sessão.<br>
    Longitudinal (passado) · Projetiva (futuro) · Estrutural (coletivo)
  </p>
</div>

</body>
</html>
