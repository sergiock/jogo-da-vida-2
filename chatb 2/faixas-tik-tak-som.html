<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Faixas · Tik Tak · Som</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0a;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
  .wrap{width:100%;max-width:600px}
  .stage{width:100%;aspect-ratio:1/1;position:relative;overflow:hidden;border-radius:12px;background:#0a0a0a;cursor:pointer}
  .ball{aspect-ratio:1/1;border-radius:50%;position:absolute;left:50%;transform:translateX(-50%);opacity:0;z-index:10}
  .ball.red{background:#E24B4A;top:2%}
  .ball.blue{background:#378ADD;bottom:2%}
  .ring{aspect-ratio:1/1;border-radius:50%;position:absolute;left:50%;transform:translate(-50%,-50%);opacity:0;pointer-events:none;z-index:11}
  .axis{position:absolute;left:0;right:0;top:50%;height:.5px;background:rgba(255,255,255,0.2);z-index:9}
  .lbl{position:absolute;left:50%;transform:translateX(-50%);font-weight:500;opacity:0;z-index:12;pointer-events:none}
  .lbl.tik{top:4%;color:#fff}.lbl.tak{bottom:4%;color:#fff}
  
  .hud{position:absolute;bottom:12px;right:14px;display:flex;align-items:baseline;gap:8px;z-index:50;pointer-events:none;}
  .hud-name{font-size:11px;color:rgba(255,255,255,0.28);font-family:monospace;letter-spacing:0.06em;}
  .hud-sym{font-size:28px;font-weight:500;color:rgba(255,255,255,0.9);font-family:monospace;line-height:1;min-width:32px;text-align:right;}

  .cb{display:flex;align-items:center;gap:8px;padding:.7rem 0 0;flex-wrap:wrap}
  .btn{padding:5px 13px;border:.5px solid rgba(255,255,255,0.2);border-radius:8px;font-size:12px;background:transparent;color:#ccc;cursor:pointer;white-space:nowrap}
  .btn:hover{background:rgba(255,255,255,0.08)}
  .btn.on{background:rgba(255,255,255,0.12);font-weight:500;color:#fff}
  .lbl-c{font-size:12px;color:#888;white-space:nowrap}
  .gc{display:flex;align-items:center;gap:6px}
  .gc input{width:70px;accent-color:#fff}
  .gv{font-size:12px;font-weight:500;font-family:monospace;min-width:20px;color:#fff}
</style>
</head>
<body>
<a style="display:inline-block;margin-bottom:.8rem;font-size:12px;color:#555;text-decoration:none;" href="index.html" onmouseover="this.style.color='#aaa'" onmouseout="this.style.color='#555'">← índice</a>

<div class="wrap">
  <div class="stage" id="stage" onclick="initAudio()">
    <canvas id="cv"></canvas>
    <div class="axis"></div>
    <div class="ball red"  id="ball-red"></div>
    <div class="ball blue" id="ball-blue"></div>
    <div class="ring"      id="ring"></div>
    <div class="lbl tik"   id="lbl-tik">tik</div>
    <div class="lbl tak"   id="lbl-tak">tak</div>
    <div class="hud"><span class="hud-name">faixas · tik·tak · som</span><span class="hud-sym" id="hud-sym">A</span></div>
  </div>
  <div class="cb">
    <button class="btn" id="btn-play" onclick="togglePlay()">⏸ pausar</button>
    <div style="width:.5px;height:18px;background:rgba(255,255,255,0.15);flex-shrink:0"></div>
    <span class="lbl-c">direção</span>
    <button class="btn on" id="btn-h" onclick="setDir('h')">horizontal</button>
    <button class="btn"    id="btn-v" onclick="setDir('v')">vertical</button>
    <div style="width:.5px;height:18px;background:rgba(255,255,255,0.15);flex-shrink:0"></div>
    <span class="lbl-c">modo</span>
    <button class="btn on" id="btn-m1" onclick="setMode(1)">→ linear</button>
    <button class="btn"    id="btn-m2" onclick="setMode(2)">⇄ espelho</button>
    <button class="btn"    id="btn-m3" onclick="setMode(3)">⇆ altern.</button>
    <div style="width:.5px;height:18px;background:rgba(255,255,255,0.15);flex-shrink:0"></div>
    <div class="gc"><span class="lbl-c">faixas</span>
      <input type="range" min="1" max="12" step="1" value="6" oninput="setN(+this.value)">
      <span class="gv" id="val-n">6</span></div>
    <div style="width:.5px;height:18px;background:rgba(255,255,255,0.15);flex-shrink:0"></div>
    <span class="lbl-c">bpm</span>
    <input type="range" min="20" max="200" step="1" value="60" oninput="setBpm(+this.value)" style="width:75px">
    <span class="gv" id="val-bpm">60</span>
  </div>
</div>
<script>
  const SYMS=['A','B','C','D','E','F','G','1','2','3','1','2'];
  let N=6,bpm=60,playing=true,dir='h',mode=1;
  let seq=[],seqIdx=0,pos=0,visited=[];
  let stepTimer=null,rafId=null,pulseT=0,lastStep=0,stepMs=500;
  let audioCtx=null,audioReady=false,beatCount=0;

  const stage=document.getElementById('stage');
  const cv=document.getElementById('cv');
  const c=cv.getContext('2d');
  const BG='#0a0a0a';

  function getColor(i,n,dim){
    if(n===1) return dim?'rgba(255,255,255,0.12)':'#fff';
    const lo=Math.floor(n/2),hi=Math.ceil(n/2);
    if(i<lo)  return dim?'rgba(226,75,74,0.22)':'#E24B4A';
    if(i>=hi) return dim?'rgba(55,138,221,0.22)':'#378ADD';
    return dim?'rgba(255,255,255,0.18)':'#fff';
  }
  function resize(){
    const s=stage.offsetWidth,dpr=window.devicePixelRatio||1;
    cv.width=s*dpr;cv.height=s*dpr;cv.style.width=s+'px';cv.style.height=s+'px';
    c.setTransform(1,0,0,1,0,0);c.scale(dpr,dpr);
    const sz=Math.round(s*.62);
    document.getElementById('ball-red').style.width=sz+'px';
    document.getElementById('ball-blue').style.width=sz+'px';
    const fs=Math.round(s*.06);
    document.getElementById('lbl-tik').style.fontSize=fs+'px';
    document.getElementById('lbl-tak').style.fontSize=fs+'px';
  }
  window.addEventListener('resize',resize);

  function drawFrame(){
    const s=stage.offsetWidth,span=s/N;
    c.clearRect(0,0,s,s);c.fillStyle=BG;c.fillRect(0,0,s,s);
    const pulse=0.72+0.28*Math.sin(pulseT*Math.PI);
    const baseFz=Math.max(10,Math.min(span*.32,s*.07));
    const activeFz=baseFz*(1+0.48*pulse);
    for(let i=0;i<N;i++){
      const isLit=i===pos,wasLit=visited.includes(i)&&!isLit;
      const col=getColor(i,N,!isLit);
      let x,y,w,h;
      if(dir==='h'){x=0;y=i*span;w=s;h=span;}else{x=i*span;y=0;w=span;h=s;}
      c.fillStyle=col;c.globalAlpha=isLit?1:(wasLit?.28:.08);c.fillRect(x,y,w,h);c.globalAlpha=1;
      if(isLit){c.strokeStyle='#fff';c.globalAlpha=.1;c.lineWidth=.5;c.strokeRect(x+.25,y+.25,w-.5,h-.5);c.globalAlpha=1;}
      const fz=isLit?activeFz:baseFz;
      c.font=`500 ${fz.toFixed(1)}px monospace`;
      c.textAlign='center';c.textBaseline='middle';c.fillStyle='#fff';
      c.globalAlpha=isLit?1:(wasLit?.25:.12);
      const cx=dir==='h'?s/2:x+span/2;
      const cy=dir==='h'?y+span/2:s/2;
      const sym=SYMS[i]!==undefined?SYMS[i]:String(i+1);
      c.fillText(sym+' '+(i+1),cx,cy);c.globalAlpha=1;
    }
  }
  function animLoop(ts){
    pulseT=Math.min((ts-lastStep)/stepMs,1);drawFrame();rafId=requestAnimationFrame(animLoop);
  }
  function initAudio(){
    if(audioReady)return;
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    audioReady=true;
  }
  function beep(freq,gain,dur){
    if(!audioReady||!audioCtx)return;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);o.type='sine';
    o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    g.gain.setValueAtTime(gain,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
    o.start();o.stop(audioCtx.currentTime+dur);
  }
  function animRing(tikMode){
    const s=stage.offsetWidth,sz=Math.round(s*.62),r=document.getElementById('ring');
    r.style.width=sz+'px';r.style.height=sz+'px';r.style.left='50%';
    r.style.top=tikMode?(sz/2+s*.02)+'px':(s-sz/2-s*.02)+'px';
    r.style.border='2px solid '+(tikMode?'#E24B4A':'#378ADD');
    r.style.opacity='.9';r.style.transition='none';r.style.transform='translate(-50%,-50%) scale(1)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      r.style.transition='transform .5s ease-out,opacity .5s ease-out';
      r.style.transform='translate(-50%,-50%) scale(1.4)';r.style.opacity='0';
    }));
  }
  function showBeat(tikMode){
    beep(tikMode?1200:400,tikMode?.45:.38,tikMode?.07:.13);
    document.getElementById('ball-red').style.opacity=tikMode?'1':'0';
    document.getElementById('ball-blue').style.opacity=tikMode?'0':'1';
    document.getElementById('lbl-tik').style.opacity=tikMode?'1':'0';
    document.getElementById('lbl-tak').style.opacity=tikMode?'0':'1';
    animRing(tikMode);
    const el=document.getElementById('hud-sym');
    if(el) el.textContent=SYMS[pos]!==undefined?SYMS[pos]:String(pos+1);
  }
  function hideBalls(){
    ['ball-red','ball-blue','lbl-tik','lbl-tak'].forEach(id=>document.getElementById(id).style.opacity='0');
  }
  function buildSeq(){
    if(mode===1)return Array.from({length:N},(_,i)=>i);
    if(mode===2){const s=[];for(let i=0;i<N;i++)s.push(i);for(let i=N-2;i>=1;i--)s.push(i);return s;}
    const s=[];for(let i=0;i<N;i++)s.push(i);for(let i=N-2;i>=1;i--)s.push(i);for(let i=1;i<N;i++)s.push(i);return s;
  }
  function getHalfMs(){return Math.round(60000/bpm/2);}
  function tick(ts){
    lastStep=ts||performance.now();stepMs=getHalfMs()*2;
    pos=seq[seqIdx];visited=seq.slice(0,seqIdx);
    seqIdx=(seqIdx+1)%seq.length;if(seqIdx===0)visited=[];
    showBeat(beatCount%2===0);beatCount++;
    stepTimer=setTimeout(()=>{hideBalls();stepTimer=setTimeout(()=>requestAnimationFrame(tick),getHalfMs());},getHalfMs());
  }
  function stopAll(){if(stepTimer){clearTimeout(stepTimer);stepTimer=null;}if(rafId){cancelAnimationFrame(rafId);rafId=null;}hideBalls();}
  function startAll(){
    stopAll();seq=buildSeq();seqIdx=0;pos=seq[0];visited=[];beatCount=0;
    lastStep=performance.now();stepMs=getHalfMs()*2;
    rafId=requestAnimationFrame(animLoop);requestAnimationFrame(tick);
  }
  function togglePlay(){playing=!playing;document.getElementById('btn-play').textContent=playing?'⏸ pausar':'▶ play';if(playing)startAll();else stopAll();}
  function setDir(d){dir=d;document.getElementById('btn-h').classList.toggle('on',d==='h');document.getElementById('btn-v').classList.toggle('on',d==='v');startAll();}
  function setMode(m){mode=m;[1,2,3].forEach(i=>document.getElementById('btn-m'+i).classList.toggle('on',i===m));startAll();}
  function setN(v){N=v;document.getElementById('val-n').textContent=v;startAll();}
  function setBpm(v){bpm=v;document.getElementById('val-bpm').textContent=v;if(playing)startAll();}
  resize();startAll();
</script>
</body>
</html>
